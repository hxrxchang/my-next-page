name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
      - name: Install dependencies
        run: npm ci
      - name: Prettier check
        run: npm run prettier:check
      - name: build check
        run: npm run build
